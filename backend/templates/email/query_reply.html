<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Query Reply</title>
</head>
<body style="font-family: Arial, sans-serif;">

    <div style="text-align: center; margin-bottom: 20px;">
        <img src="https://incometaxlibrary.com/static/assets/images/logo.png" alt="Income Tax Library" style="max-width: 75px; height: auto;">
    </div>

    <p>Dear {{ name }},</p>
    <p>You got a reply from <a href="https://www.incometaxlibrary.com">Incometaxlibrary</a></p>

    <table style="border-collapse: collapse; width: 100%;">
        <tr>
            <td style="border: 1px solid #ddd; padding: 8px; width: 15%;"><strong>Query Subject</strong></td>
            <td style="border: 1px solid #ddd; padding: 8px; width: 85%;">{{ subject }}</td>
        </tr>
        <tr>
            <td style="border: 1px solid #ddd; padding: 8px; width: 15%;"><strong>Section</strong></td>
            <td style="border: 1px solid #ddd; padding: 8px; width: 85%;">{{ category }}</td>
        </tr>
        <tr>
            <td style="border: 1px solid #ddd; padding: 8px; width: 15%;"><strong>Query</strong></td>
            <td style="border: 1px solid #ddd; padding: 8px; width: 85%;">{{ details }}</td>
        </tr>
        <tr>
            <td style="border: 1px solid #ddd; padding: 8px; width: 15%;"><strong>Reply</strong></td>
            <td style="border: 1px solid #ddd; padding: 8px; width: 85%;">{{ answer|safe }}</td>
        </tr>
        <tr>
            <td style="border: 1px solid #ddd; padding: 8px; width: 15%;"><strong>Replied by</strong></td>
            <td style="border: 1px solid #ddd; padding: 8px; width: 85%;">Income Tax Library (Team ITL)</td>
        </tr>
    </table>

    <p>Thanks with regards,<br><strong>Income Tax Library Team</strong></p>
</body>
</html>
