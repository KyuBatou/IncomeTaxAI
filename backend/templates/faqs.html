{% extends 'base.html' %}

{% block content %}
<!-- main-area -->
<main class="main-content">
    <div class="noise-bg" data-background="assets/img/bg/noise_bg.png" style="background-image: url(&quot;assets/img/bg/noise_bg.png&quot;);"></div>
    <div class="main-shape" data-background="assets/img/images/main_shape.png" style="background-image: url(&quot;assets/img/images/main_shape.png&quot;);"></div>

    <!-- breadcrumb-area -->
    <section class="breadcrumb-area">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <div class="breadcrumb-content">
                        <h2 class="title"><span>FAQs</span></h2>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- breadcrumb-area-end -->

    <!-- faq-area -->
    <section class="faq-area pb-150">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="faq-wrap">
                        <div class="accordion" id="accordionExample">
                            {% for faq in faqs %}
                                <div class="accordion-item {% if forloop.first %}active{% endif %}">
                                    <h2 class="accordion-header">
                                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{ faq.id }}" aria-expanded="false" aria-controls="collapse{{ faq.id }}">
                                            {{ faq.question }}
                                        </button>
                                    </h2>
                                    <div id="collapse{{ faq.id }}" class="accordion-collapse collapse {% if forloop.first %}show{% endif %}" data-bs-parent="#accordionExample">
                                        <div class="accordion-body">
                                            <p>{{ faq.answer }}</p>
                                        </div>
                                    </div>
                                </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</main>
<!-- main-area-end -->
{% endblock %}
